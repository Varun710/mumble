name: Mumble
options:
  bundleIdPrefix: com.mumble
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/argmax-oss-swift
    from: "1.0.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.1.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    DEAD_CODE_STRIPPING: YES

targets:
  Mumble:
    type: application
    platform: macOS
    sources:
      - path: Mumble
        excludes:
          - "Logo/**"
    settings:
      base:
        PRODUCT_NAME: Mumble
        PRODUCT_BUNDLE_IDENTIFIER: app.mumble.Mumble
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Mumble/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mumble/Resources/Mumble.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        ENABLE_TESTABILITY: YES
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-weak_framework"
          - "FoundationModels"
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: FluidAudio
        product: FluidAudio

  MumbleTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MumbleTests
    dependencies:
      - target: Mumble
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.mumble.MumbleTests
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
